<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장례 상담 대시보드</title>
<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f3d4058adf35590d702effb4941ee77f&autoload=false"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
  --muted: #6b7280; --muted2: #9ca3af; --fg: #f1f5f9;
  --primary: #6366f1; --blue: #3b82f6; --orange: #f97316; --green: #22c55e;
  --accent: #252836; --input: #1e2130; --red: #ef4444;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); overflow: hidden; height: 100vh; }

/* ── HEADER ── */
#hdr { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 500; }
#logo { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #fff; flex-shrink: 0; }
#app-title { font-weight: 700; font-size: 15px; white-space: nowrap; }
#hdr-time { font-size: 11px; color: var(--muted2); margin-left: auto; flex-shrink: 0; }

/* ── SEARCH ── */
#search-wrap { flex: 1; max-width: 360px; margin: 0 auto; position: relative; }
#search-input { width: 100%; height: 34px; background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 0 30px 0 34px; font-size: 13px; color: var(--fg); outline: none; }
#search-input:focus { border-color: var(--primary); }
#search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 14px; }
#search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; display: none; padding: 0; }
#search-dd { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 600; max-height: 240px; overflow-y: auto; display: none; }
.s-item { display: block; width: 100%; text-align: left; padding: 10px 12px; border: none; background: none; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--fg); }
.s-item:last-child { border-bottom: none; }
.s-item:hover { background: var(--accent); }

/* ── LAYOUT ── */
#main { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; display: flex; }

/* ── MAP SECTION ── */
#map-section { position: relative; flex: 1; min-width: 0; }
#map { width: 100%; }

#map-controls { 
  position: absolute; 
  top: 16px; 
  left: 16px; 
  right: 16px; 
  z-index: 1000; 
  display: flex; 
  gap: 10px; 
  align-items: flex-start; 
  pointer-events: none; 
}
#map-controls > * { pointer-events: auto; }

.ctrl-btn, #region-sel { 
  height: 38px; 
  padding: 0 14px; 
  background: rgba(26, 29, 39, 0.9); 
  backdrop-filter: blur(8px); 
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.15); 
  border-radius: 10px; 
  color: var(--fg); 
  font-size: 13px; 
  font-weight: 600; 
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  gap: 6px; 
  box-shadow: 0 4px 16px rgba(0,0,0,0.5); 
  transition: all .2s ease; 
  white-space: nowrap; 
}
.ctrl-btn:hover, #region-sel:hover { border-color: var(--primary); background: var(--card); }
.ctrl-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
.ctrl-btn.active-blue { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

#region-sel { outline: none; }

#type-tabs { 
  background: rgba(26, 29, 39, 0.9);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 10px; 
  padding: 4px; 
  box-shadow: 0 4px 16px rgba(0,0,0,0.5); 
  display: flex; 
  gap: 4px; 
  margin-left: auto; 
}
.t-tab { 
  height: 30px; 
  padding: 0 12px; 
  border-radius: 6px; 
  border: none; 
  background: transparent; 
  color: var(--muted2); 
  font-size: 12px; 
  font-weight: 600; 
  cursor: pointer; 
  transition: all .2s ease; 
}
.t-tab:hover { background: rgba(255, 255, 255, 0.05); color: var(--fg); }
.t-tab.on-all          { background: var(--primary); color: #fff; box-shadow: 0 2px 6px rgba(99,102,241,.3); }
.t-tab.on-funeral_home { background: var(--blue); color: #fff; box-shadow: 0 2px 6px rgba(59,130,246,.3); }
.t-tab.on-crematorium  { background: var(--orange); color: #fff; box-shadow: 0 2px 6px rgba(249,115,22,.3); }
.t-tab.on-cemetery     { background: var(--green); color: #fff; box-shadow: 0 2px 6px rgba(34,197,94,.3); }

/* ── RIGHT PANEL ── */
#panel { width: 380px; max-width: 35%; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: -4px 0 15px rgba(0,0,0,.25); overflow: hidden; }
#panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.p-tab { flex: 1; padding: 10px; font-size: 12px; font-weight: 600; border: none; background: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
.p-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
#panel-body { flex: 1; overflow: hidden; }
.p-view { height: 100%; overflow-y: auto; display: none; }
.p-view.active { display: block; }

/* ── DETAIL VIEW ── */
.det-header { padding: 16px 18px 12px; }
.det-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
.badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; border: 1px solid; }
.badge-primary { background: rgba(99,102,241,.15); color: var(--primary); border-color: rgba(99,102,241,.3); }
.badge-gray { background: var(--accent); color: var(--muted2); border-color: var(--border); }
#cmp-toggle-btn { margin-left: auto; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 6px; border: 1px solid; cursor: pointer; transition: all .15s; }
.btn-cmp-add  { border-color: rgba(99,102,241,.4); color: var(--primary); background: rgba(99,102,241,.1); }
.btn-cmp-rem  { border-color: rgba(239,68,68,.4); color: var(--red); background: rgba(239,68,68,.08); }
.btn-cmp-full { border-color: var(--border); color: var(--muted); background: transparent; opacity: .5; cursor: not-allowed; }
.det-title { font-size: 19px; font-weight: 700; margin-bottom: 12px; }
.det-info { display: flex; align-items: flex-start; gap: 7px; font-size: 13px; color: var(--muted2); margin-bottom: 6px; }
.det-info a { color: var(--muted2); text-decoration: none; }
.det-info a:hover { color: var(--primary); }
.reserve-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 9px; background: var(--orange); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 12px; text-decoration: none; }
.info-tbl { background: var(--accent); border-radius: 8px; border: 1px solid var(--border); padding: 2px 12px; }
.tbl-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 12px; }
.tbl-row:last-child { border-bottom: none; }
.tbl-lbl { color: var(--muted); }
.yn-y { color: var(--green); }
.yn-n { color: var(--muted); opacity: .6; }

/* ── COMPARE VIEW ── */
.cmp-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; }
.cmp-clear-btn { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; }
.cmp-grid { display: grid; font-size: 11px; }
.cmp-cell { padding: 7px 8px; border-bottom: 1px solid rgba(255,255,255,.05); }
.cmp-head-cell { text-align: center; border-left: 1px solid var(--border); padding: 10px 6px; }
.cmp-lbl-cell { color: var(--muted); }
.cmp-val-cell { text-align: center; border-left: 1px solid rgba(255,255,255,.05); }
.cmp-best { background: rgba(99,102,241,.07); }
.best-tag { font-size: 9px; color: var(--primary); font-weight: 700; display: block; margin-top: 1px; }
.cmp-rm-btn { background: none; border: none; color: var(--muted); cursor: pointer; float: right; font-size: 14px; line-height: 1; }
.sec-label { padding: 8px 12px 4px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

/* ── RECOMMEND VIEW ── */
.rec-filters { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.rec-mode-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.rec-mode-toggle { display: flex; background: var(--accent); border-radius: 8px; padding: 3px; }
.rec-mode-btn { flex: 1; padding: 4px 10px; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.rec-mode-btn.active { background: var(--card); color: var(--fg); box-shadow: 0 1px 4px rgba(0,0,0,.3); }
.rec-mode-btn.active-nearby { background: var(--blue); color: #fff; }
.rec-mode-btn:disabled { opacity: .4; cursor: not-allowed; }
.filter-lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block; }
.filter-sel { background: var(--input); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; padding: 5px 8px; width: 100%; outline: none; cursor: pointer; margin-bottom: 8px; }
.type-filter-btns { display: flex; gap: 5px; margin-bottom: 8px; }
.type-filter-btn { flex: 1; padding: 5px; border-radius: 6px; border: 1px solid var(--border); background: var(--input); color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s; }
.type-filter-btn.active { border-color: var(--primary); background: rgba(99,102,241,.15); color: var(--primary); }
.nearby-info { background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.3); border-radius: 8px; padding: 7px 10px; font-size: 11px; color: #93c5fd; }
.rec-list { overflow-y: auto; }
.rec-item { display: flex; gap: 9px; padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,.05); cursor: pointer; transition: background .1s; }
.rec-item:hover { background: var(--accent); }
.rec-rank { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); flex-shrink: 0; margin-top: 2px; }
.rec-rank.first { background: var(--primary); color: #fff; }
.rec-rank.first-near { background: var(--blue); color: #fff; }
.rec-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.rec-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; }
.rec-dist { margin-left: auto; color: #60a5fa; font-weight: 600; }
.rec-stats { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; }
.rec-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

/* ── EMPTY ── */
.empty { display: flex; height: 100%; align-items: center; justify-content: center; color: var(--muted); text-align: center; padding: 24px; font-size: 13px; }
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">FC</div>
  <div id="app-title">장례 상담 대시보드</div>
  <div id="search-wrap">
    <span id="search-icon">🔍</span>
    <input id="search-input" type="text" placeholder="시설명 또는 주소 검색..." autocomplete="off">
    <button id="search-clear">×</button>
    <div id="search-dd"></div>
  </div>
  <div id="hdr-time"></div>
</div>

<div id="main">
  <div id="map-section">
    <div id="map-controls">
      <select id="region-sel"><option value="all">전체 지역</option></select>
      <button class="ctrl-btn" id="radius-btn">⬡ 10km</button>
      <button class="ctrl-btn" id="locate-btn">◎ 내 위치</button>
      <div id="type-tabs">
        <button class="t-tab on-all" data-type="all">전체</button>
        <button class="t-tab" data-type="funeral_home">장례식장</button>
        <button class="t-tab" data-type="crematorium">화장장</button>
        <button class="t-tab" data-type="cemetery">장지</button>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <div id="panel">
    <div id="panel-tabs">
      <button class="p-tab active" data-tab="detail">상세 정보</button>
      <button class="p-tab" data-tab="compare">비교</button>
      <button class="p-tab" data-tab="recommend">최적 추천</button>
    </div>
    <div id="panel-body">
      <div class="p-view active" id="v-detail"><div class="empty">마커를 클릭하여<br>상세 정보를 확인하세요</div></div>
      <div class="p-view" id="v-compare"></div>
      <div class="p-view" id="v-recommend"></div>
    </div>
  </div>
</div>

<script>
const DATA = [
  {id:1001,name:"삼성서울병원장례식장",type:"funeral_home",addr:"서울 강남구 일원동 50",region:"서울",lat:37.4881,lng:127.0848,phone:"02-3410-3151",parking:500,halls:15,hours:"24시간",restaurant:true,lounge:true,store:true,disability:true},

  {id:1003,name:"서울대학교병원장례식장",type:"funeral_home",addr:"서울 종로구 대학로 101",region:"서울",lat:37.5792,lng:126.9989,phone:"02-2072-2020",parking:350,halls:12,hours:"24시간",restaurant:true,lounge:true,store:false,disability:true},
  {id:1004,name:"아주대학교병원장례식장",type:"funeral_home",addr:"경기 수원시 영통구 월드컵로 164",region:"경기",lat:37.2740,lng:127.0460,phone:"031-219-4114",parking:200,halls:8,hours:"24시간",restaurant:true,lounge:true,store:false,disability:false},
  {id:1005,name:"분당서울대병원장례식장",type:"funeral_home",addr:"경기 성남시 분당구 구미로 173번길 82",region:"경기",lat:37.3519,lng:127.1239,phone:"031-787-1500",parking:300,halls:10,hours:"24시간",restaurant:true,lounge:true,store:true,disability:true},
  {id:1006,name:"부산대학교병원장례식장",type:"funeral_home",addr:"부산 서구 구덕로 179",region:"부산",lat:35.1066,lng:129.0170,phone:"051-240-7000",parking:250,halls:11,hours:"24시간",restaurant:true,lounge:true,store:false,disability:true},
  {id:1007,name:"계명대학교동산병원장례식장",type:"funeral_home",addr:"대구 중구 달성로 56",region:"대구",lat:35.8660,lng:128.5650,phone:"053-250-7114",parking:280,halls:9,hours:"24시간",restaurant:true,lounge:true,store:true,disability:false},
  {id:1008,name:"인천성모병원장례식장",type:"funeral_home",addr:"인천 남동구 남동대로774번길 21",region:"인천",lat:37.4393,lng:126.7300,phone:"032-280-5000",parking:240,halls:8,hours:"24시간",restaurant:true,lounge:false,store:false,disability:true},
  {id:1009,name:"전남대학교병원장례식장",type:"funeral_home",addr:"광주 동구 제봉로 42",region:"광주",lat:35.1462,lng:126.9255,phone:"062-220-5114",parking:200,halls:7,hours:"24시간",restaurant:true,lounge:true,store:false,disability:false},
  {id:1010,name:"충남대학교병원장례식장",type:"funeral_home",addr:"대전 중구 문화로 282",region:"대전",lat:36.3222,lng:127.4162,phone:"042-280-7114",parking:180,halls:6,hours:"24시간",restaurant:true,lounge:false,store:false,disability:false},
  {id:2001,name:"서울시립승화원",type:"crematorium",addr:"서울 서대문구 홍은동 산 1-1",region:"서울",lat:37.6011,lng:126.9430,phone:"02-359-8761",parking:300,halls:null,hours:"09:00~18:00",restaurant:true,lounge:true,store:false,disability:true},
  {id:2002,name:"서울추모공원 화장장",type:"crematorium",addr:"서울 강동구 상일동 산 36",region:"서울",lat:37.5452,lng:127.1706,phone:"02-3407-5500",parking:250,halls:null,hours:"08:30~17:30",restaurant:false,lounge:false,store:false,disability:true},
  {id:2003,name:"부산영락공원",type:"crematorium",addr:"부산 동래구 우장춘로 17",region:"부산",lat:35.2121,lng:129.0696,phone:"051-555-8100",parking:400,halls:null,hours:"08:00~17:00",restaurant:true,lounge:true,store:false,disability:true},
  {id:2004,name:"경기도공설화장장",type:"crematorium",addr:"경기 고양시 덕양구 서삼릉길 233",region:"경기",lat:37.6500,lng:126.8800,phone:"031-900-1114",parking:500,halls:null,hours:"08:00~18:00",restaurant:true,lounge:true,store:true,disability:true},
  {id:3001,name:"서울추모공원납골당",type:"cemetery",addr:"서울 서초구 원지동 산 65",region:"서울",lat:37.4356,lng:127.0486,phone:"02-3413-8514",parking:100,halls:null,hours:"09:00~17:00",restaurant:false,lounge:false,store:false,disability:true},
  {id:3002,name:"인천가족공원",type:"cemetery",addr:"인천 미추홀구 문학산로 212",region:"인천",lat:37.4398,lng:126.6837,phone:"032-431-2441",parking:200,halls:null,hours:"09:00~17:00",restaurant:false,lounge:false,store:false,disability:false},
];

const TC = {funeral_home:"#3b82f6", crematorium:"#f97316", cemetery:"#22c55e"};
const TL = {funeral_home:"장례식장", crematorium:"화장장", cemetery:"장지"};
const RC = {서울:{lat:37.5665,lng:126.978,z:6},경기:{lat:37.4138,lng:127.518,z:8},부산:{lat:35.1796,lng:129.076,z:6},대구:{lat:35.8714,lng:128.601,z:6},인천:{lat:37.4563,lng:126.705,z:6},광주:{lat:35.1595,lng:126.853,z:6},대전:{lat:36.3504,lng:127.385,z:6}};

const S = { map:null, layers:{}, typeFilter:"all", regionFilter:"all", radius:false, selId:null, cmpList:[], userLat:null, userLng:null, userMk:null, recMode:"score", recType:"funeral_home", recRegion:"all", recGuests:100, activeTab:"detail" };

window.addEventListener('load', function() {
  const h = window.innerHeight - 56;
  document.getElementById('map').style.height = h + 'px';
  document.getElementById('panel').style.height = h + 'px';

  /* 2. kakao.maps.load 내부에서 지도를 안전하게 초기화 */
  kakao.maps.load(function() {
    const container = document.getElementById('map');
    const options = { center: new kakao.maps.LatLng(36.5, 127.8), level: 12 };
    S.map = new kakao.maps.Map(container, options);

    kakao.maps.event.addListener(S.map, 'idle', function() {
      if (S.radius) renderMarkers();
    });

    renderMarkers();
  });

  window.addEventListener('resize', function() {
    const nh = window.innerHeight - 56;
    document.getElementById('map').style.height = nh + 'px';
    document.getElementById('panel').style.height = nh + 'px';
    if(S.map) S.map.relayout();
  });

  const regions = [...new Set(DATA.map(h=>h.region))].sort();
  const rsel = document.getElementById('region-sel');
  regions.forEach(r => { const o=document.createElement('option'); o.value=r; o.textContent=r; rsel.appendChild(o); });

  renderRecommend();
  updateTime();
  setInterval(updateTime, 30000);
});

function updateTime() {
  document.getElementById('hdr-time').textContent = new Date().toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function getFiltered() {
  if(!S.map) return [];
  return DATA.filter(h => {
    if (S.typeFilter !== 'all' && h.type !== S.typeFilter) return false;
    if (S.regionFilter !== 'all' && h.region !== S.regionFilter) return false;
    if (S.radius) {
      const c = S.map.getCenter();
      if (dist(c.getLat(), c.getLng(), h.lat, h.lng) > 10) return false;
    }
    return true;
  });
}

function renderMarkers() {
  if(!S.map) return;
  Object.values(S.layers).forEach(l => { if(l) l.setMap(null); });
  S.layers = {};

  const data = getFiltered();

  data.forEach(h => {
    const sel = S.selId === h.id;
    
    const content = document.createElement('div');
    const size = sel ? 26 : 18;
    content.style.width = size + 'px';
    content.style.height = size + 'px';
    content.style.backgroundColor = TC[h.type];
    content.style.borderRadius = '50%';
    content.style.border = '2px solid #fff';
    content.style.boxShadow = sel ? '0 0 10px rgba(0,0,0,0.6)' : '0 2px 4px rgba(0,0,0,0.4)';
    content.style.cursor = 'pointer';
    content.style.transition = 'all 0.15s ease';
    content.title = h.name;

    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(h.lat, h.lng),
      content: content,
      xAnchor: 0.5,
      yAnchor: 0.5
    });

    content.addEventListener('click', function(e) {
      e.stopPropagation();
      S.selId = h.id;
      renderMarkers();
      switchTab('detail');
      renderDetail();
    });

    overlay.setMap(S.map);
    S.layers[h.id] = overlay;
  });

  if (S.layers._circle) S.layers._circle.setMap(null);
  if (S.radius) {
    const c = S.map.getCenter();
    const circle = new kakao.maps.Circle({
      center: c,
      radius: 10000,
      strokeWeight: 2,
      strokeColor: '#6366f1',
      strokeOpacity: 0.8,
      strokeStyle: 'dashed',
      fillColor: '#6366f1',
      fillOpacity: 0.05
    });
    circle.setMap(S.map);
    S.layers._circle = circle;
    document.getElementById('radius-btn').textContent = `⬡ 10km (${data.length}개)`;
  } else {
    document.getElementById('radius-btn').textContent = '⬡ 10km';
  }
}

function dist(a,b,c,d) {
  const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,
    x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

document.getElementById('region-sel').addEventListener('change', function() {
  if(!S.map) return;
  S.regionFilter = this.value;
  if (S.regionFilter !== 'all' && RC[S.regionFilter]) {
    const c = RC[S.regionFilter];
    S.map.setCenter(new kakao.maps.LatLng(c.lat, c.lng));
    S.map.setLevel(c.z);
  }
  renderMarkers();
});

document.getElementById('radius-btn').addEventListener('click', function() {
  S.radius = !S.radius;
  this.classList.toggle('active', S.radius);
  renderMarkers();
});

document.getElementById('locate-btn').addEventListener('click', function() {
  if (!navigator.geolocation || !S.map) { alert('위치 서비스 미지원 또는 지도 로딩 안됨'); return; }
  const btn = this;
  btn.textContent = '⏳ 찾는 중...';
  navigator.geolocation.getCurrentPosition(pos => {
    S.userLat = pos.coords.latitude;
    S.userLng = pos.coords.longitude;
    
    const userLoc = new kakao.maps.LatLng(S.userLat, S.userLng);
    S.map.setCenter(userLoc);
    S.map.setLevel(5);

    if (S.userMk) S.userMk.setMap(null);
    
    const uContent = document.createElement('div');
    uContent.style.width = '20px';
    uContent.style.height = '20px';
    uContent.style.backgroundColor = '#3b82f6';
    uContent.style.borderRadius = '50%';
    uContent.style.border = '3px solid #fff';
    uContent.style.boxShadow = '0 2px 6px rgba(0,0,0,0.5)';
    uContent.title = '내 위치';

    S.userMk = new kakao.maps.CustomOverlay({
      position: userLoc,
      content: uContent,
      xAnchor: 0.5,
      yAnchor: 0.5
    });
    S.userMk.setMap(S.map);

    btn.textContent = '◎ 내 위치';
    btn.classList.add('active-blue');
    S.recMode = 'nearby';
    switchTab('recommend');
    renderRecommend();
    renderMarkers();
  }, () => {
    btn.textContent = '◎ 내 위치';
    alert('위치를 가져올 수 없습니다.');
  }, {timeout:10000});
});

document.querySelectorAll('.t-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    S.typeFilter = this.dataset.type;
    document.querySelectorAll('.t-tab').forEach(b => b.className = 't-tab');
    this.className = 't-tab on-' + S.typeFilter;
    renderMarkers();
  });
});

function switchTab(tab) {
  S.activeTab = tab;
  document.querySelectorAll('.p-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.p-view').forEach(v => v.classList.toggle('active', v.id === 'v-'+tab));
  if (tab === 'compare') renderCompare();
  if (tab === 'recommend') renderRecommend();
}
document.querySelectorAll('.p-tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

function yn(v) { return v ? `<span class="yn-y">✓ 있음</span>` : `<span class="yn-n">없음</span>`; }

function renderDetail() {
  const h = DATA.find(x => x.id === S.selId);
  const el = document.getElementById('v-detail');
  if (!h) { el.innerHTML = '<div class="empty">마커를 클릭하여<br>상세 정보를 확인하세요</div>'; return; }

  const inCmp = S.cmpList.some(c=>c.id===h.id);
  const canAdd = !inCmp && S.cmpList.length < 3;
  const cmpLbl = inCmp?'비교 제거':canAdd?'비교 추가':'비교 꽉참';
  const cmpCls = inCmp?'btn-cmp-rem':canAdd?'btn-cmp-add':'btn-cmp-full';
  const res = h.type==='crematorium' ? `<a class="reserve-btn" href="https://www.15774129.go.kr" target="_blank">↗ 화장장 예약하기</a>` : '';

  el.innerHTML = `
    <div class="det-header">
      <div class="det-badges">
        <span class="badge badge-primary">${TL[h.type]}</span>
        <span class="badge badge-gray">${h.region}</span>
        <button id="cmp-toggle-btn" class="${cmpCls}">${cmpLbl}</button>
      </div>
      <div class="det-title">${h.name}</div>
      <div class="det-info">📍 <span>${h.addr}</span></div>
      ${h.phone?`<div class="det-info">📞 <a href="tel:${h.phone}">${h.phone}</a></div>`:''}
      ${h.hours?`<div class="det-info">🕐 <span>${h.hours}</span></div>`:''}
      ${res}
      <div class="info-tbl">
        <div class="tbl-row"><span class="tbl-lbl">주차 대수</span><span>${h.parking?h.parking+'대':'-'}</span></div>
        ${h.type==='funeral_home'?`<div class="tbl-row"><span class="tbl-lbl">빈소 수</span><span>${h.halls?h.halls+'실':'-'}</span></div>`:''}
        <div class="tbl-row"><span class="tbl-lbl">식당</span><span>${yn(h.restaurant)}</span></div>
        <div class="tbl-row"><span class="tbl-lbl">유족대기실</span><span>${yn(h.lounge)}</span></div>
        <div class="tbl-row"><span class="tbl-lbl">매점</span><span>${yn(h.store)}</span></div>
        <div class="tbl-row"><span class="tbl-lbl">장애인 편의시설</span><span>${yn(h.disability)}</span></div>
      </div>
    </div>`;

  document.getElementById('cmp-toggle-btn').addEventListener('click', () => {
    if (inCmp) S.cmpList = S.cmpList.filter(c=>c.id!==h.id);
    else if (canAdd) S.cmpList.push(h);
    updateCmpTab();
    renderDetail();
  });
}

function updateCmpTab() {
  const t = document.querySelector('.p-tab[data-tab="compare"]');
  t.textContent = S.cmpList.length > 0 ? `비교 (${S.cmpList.length})` : '비교';
}

function renderCompare() {
  const el = document.getElementById('v-compare');
  const L2 = S.cmpList;
  if (!L2.length) { el.innerHTML = '<div class="empty">상세 탭에서<br>"비교 추가"를 눌러주세요<br><small style="opacity:.5;margin-top:4px;display:block">최대 3개</small></div>'; return; }

  const cols = L2.length, gs = `100px repeat(${cols},1fr)`;
  const mp = Math.max(...L2.map(h=>h.parking||0)), mh = Math.max(...L2.map(h=>h.halls||0));

  const rows = [
    {l:'주차 대수', r:h=>h.parking?h.parking+'대':'-', best:h=>(h.parking||0)===mp&&mp>0},
    {l:'빈소 수',   r:h=>h.halls?h.halls+'실':'-',   best:h=>(h.halls||0)===mh&&mh>0},
    {l:'유족대기실', r:h=>h.lounge?'✓':'-'},
    {l:'장애인시설', r:h=>h.disability?'✓':'-'},
    {l:'식당',      r:h=>h.restaurant?'✓':'-'},
    {l:'매점',      r:h=>h.store?'✓':'-'},
  ];

  el.innerHTML = `
    <div class="cmp-header">
      <span>시설 비교 (${L2.length}/3)</span>
      <button class="cmp-clear-btn" onclick="S.cmpList=[];updateCmpTab();renderCompare();renderDetail()">전체 삭제</button>
    </div>
    <div class="cmp-grid" style="grid-template-columns:${gs}">
      <div class="cmp-cell cmp-lbl-cell"></div>
      ${L2.map(h=>`<div class="cmp-cell cmp-head-cell">
        <button class="cmp-rm-btn" onclick="S.cmpList=S.cmpList.filter(c=>c.id!=${h.id});updateCmpTab();renderCompare();renderDetail()">×</button>
        <div style="font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;background:${TC[h.type]}22;color:${TC[h.type]};margin-bottom:3px;display:inline-block">${TL[h.type]}</div>
        <div style="font-size:11px;font-weight:700;line-height:1.3">${h.name}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${h.region}</div>
      </div>`).join('')}
    </div>
    <div class="sec-label">시설 정보</div>
    ${rows.map(row=>`
      <div class="cmp-grid" style="grid-template-columns:${gs}">
        <div class="cmp-cell cmp-lbl-cell">${row.l}</div>
        ${L2.map(h=>{const b=row.best?.(h);return`<div class="cmp-cell cmp-val-cell${b?' cmp-best':''}">${row.r(h)}${b?`<span class="best-tag">최고</span>`:''}</div>`;}).join('')}
      </div>`).join('')}`;
}

function renderRecommend() {
  const el = document.getElementById('v-recommend');
  const regions = [...new Set(DATA.map(h=>h.region))].sort();

  el.innerHTML = `
    <div class="rec-filters">
      <div class="rec-mode-row">
        <span style="font-size:13px;font-weight:600">최적 시설 추천</span>
        <div class="rec-mode-toggle">
          <button class="rec-mode-btn${S.recMode==='score'?' active':''}" id="rsb">점수 기반</button>
          <button class="rec-mode-btn${S.recMode==='nearby'?' active-nearby':''}" id="rnb" ${!S.userLat?'disabled':''}>📍 내 위치</button>
        </div>
      </div>
      <div id="rec-filter-inner"></div>
    </div>
    <div class="rec-list" id="rec-list" style="height:calc(100% - 140px);overflow-y:auto"></div>`;

  document.getElementById('rsb').addEventListener('click', () => { S.recMode='score'; renderRecommend(); });
  document.getElementById('rnb').addEventListener('click', () => { if(S.userLat){S.recMode='nearby';renderRecommend();} });

  const fi = document.getElementById('rec-filter-inner');
  if (S.recMode === 'nearby') {
    fi.innerHTML = S.userLat ? `<div class="nearby-info">현재 위치 기준 가까운 장례식장 순으로 표시됩니다</div>` : `<div class="nearby-info" style="color:var(--muted)">지도에서 내 위치 버튼을 눌러주세요</div>`;
  } else {
    fi.innerHTML = `
      <label class="filter-lbl">지역</label>
      <select class="filter-sel" id="rec-reg">
        <option value="all">전체 지역</option>
        ${regions.map(r=>`<option value="${r}"${S.recRegion===r?' selected':''}>${r}</option>`).join('')}
      </select>
      <div class="type-filter-btns">
        ${['funeral_home','crematorium','cemetery'].map(t=>`<button class="type-filter-btn${S.recType===t?' active':''}" data-rt="${t}">${TL[t]}</button>`).join('')}
      </div>`;
    document.getElementById('rec-reg').addEventListener('change', e => { S.recRegion=e.target.value; renderRecItems(); });
    fi.querySelectorAll('[data-rt]').forEach(b => b.addEventListener('click', () => { S.recType=b.dataset.rt; renderRecommend(); }));
  }
  renderRecItems();
}

function renderRecItems() {
  const el = document.getElementById('rec-list');
  if (!el) return;
  let items;
  if (S.recMode === 'nearby') {
    if (!S.userLat) { el.innerHTML = '<div class="empty" style="height:auto;padding:24px">내 위치 버튼을 먼저<br>눌러주세요</div>'; return; }
    items = DATA.filter(h=>h.type==='funeral_home'&&h.lat)
      .map(h=>({...h, d:dist(S.userLat,S.userLng,h.lat,h.lng)}))
      .sort((a,b)=>a.d-b.d).slice(0,10);
  } else {
    items = DATA.filter(h=>{
      if(S.recType!=='all'&&h.type!==S.recType)return false;
      if(S.recRegion!=='all'&&h.region!==S.recRegion)return false;
      return true;
    }).map(h=>({...h, score:(h.parking||0)*.3+(h.halls||0)*10+(h.lounge?15:0)+(h.disability?10:0)+(h.restaurant?10:0)}))
      .sort((a,b)=>b.score-a.score).slice(0,5);
  }

  if (!items.length) { el.innerHTML = '<div class="empty" style="height:auto;padding:24px">해당 조건의 시설이 없습니다</div>'; return; }

  el.innerHTML = items.map((h,i) => {
    const nb = S.recMode==='nearby', f = i===0;
    const dstr = h.d!=null?(h.d<1?Math.round(h.d*1000)+'m':h.d.toFixed(1)+'km'):null;
    return `<div class="rec-item" data-id="${h.id}">
      <div class="rec-rank${f?(nb?' first-near':' first'):''}">` + (f?'★':i+1) + `</div>
      <div style="flex:1;min-width:0">
        <div class="rec-name">${h.name}${f?`<span class="rec-badge" style="background:${nb?'rgba(59,130,246,.2)':'rgba(99,102,241,.15)'};color:${nb?'#60a5fa':'var(--primary)'}">${nb?'가장 가까움':'추천'}</span>`:''}</div>
        <div class="rec-meta">📍 ${h.region}${dstr?`<span class="rec-dist">${dstr}</span>`:''}</div>
        <div class="rec-stats">${h.parking?`<span>🚗 주차 ${h.parking}대</span>`:''}${h.halls?`<span>🏛 빈소 ${h.halls}실</span>`:''}${h.lounge?`<span style="color:var(--green)">유족대기실</span>`:''}</div>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.rec-item').forEach(item => {
    item.addEventListener('click', () => {
      const h = DATA.find(x=>x.id==item.dataset.id);
      if (!h || !S.map) return;
      S.selId = h.id;
      renderMarkers();
      if (h.lat) {
        S.map.setCenter(new kakao.maps.LatLng(h.lat, h.lng));
        S.map.setLevel(4);
      }
      switchTab('detail');
      renderDetail();
    });
  });
}

const si = document.getElementById('search-input');
const sd = document.getElementById('search-dd');
const sc = document.getElementById('search-clear');

si.addEventListener('input', () => {
  const q = si.value.trim().toLowerCase();
  sc.style.display = q ? 'block' : 'none';
  if (!q) { sd.style.display='none'; return; }
  const res = DATA.filter(h=>h.name.toLowerCase().includes(q)||h.addr.toLowerCase().includes(q)).slice(0,10);
  if (!res.length) { sd.innerHTML='<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">검색 결과 없음</div>'; sd.style.display='block'; return; }
  sd.innerHTML = res.map(h=>`<button class="s-item" data-id="${h.id}">
    <span style="font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;background:${TC[h.type]}22;color:${TC[h.type]};margin-right:6px">${TL[h.type]}</span>
    <span style="font-size:13px;font-weight:500">${h.name}</span>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">${h.addr}</div>
  </button>`).join('');
  sd.style.display = 'block';
});

sd.addEventListener('click', e => {
  const btn = e.target.closest('.s-item');
  if (!btn || !S.map) return;
  const h = DATA.find(x=>x.id==btn.dataset.id);
  if (!h) return;
  si.value = h.name;
  sc.style.display = 'block';
  sd.style.display = 'none';
  S.selId = h.id;
  renderMarkers();
  if (h.lat) {
    S.map.setCenter(new kakao.maps.LatLng(h.lat, h.lng));
    S.map.setLevel(4);
  }
  switchTab('detail');
  renderDetail();
});

sc.addEventListener('click', () => { si.value=''; sc.style.display='none'; sd.style.display='none'; });
document.addEventListener('click', e => { if (!e.target.closest('#search-wrap')) sd.style.display='none'; });
</script>
</body>
</html>
